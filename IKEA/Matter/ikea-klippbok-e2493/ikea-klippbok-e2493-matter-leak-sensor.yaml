blueprint:
  name: IKEA KLIPPBOK E2493 Leak Sensor (Matter) v2.0
  description: 'Full-featured automation for the IKEA KLIPPBOK E2493 Matter leak sensor. 
    Supports immediate and delayed actions for both wet (leak) and dry (clear) states, plus battery alerts.
    Inspired by the community blueprint by [censay](https://community.home-assistant.io/t/ikea-klippbok-matter-over-thread-leak-detector-e2493/968818).
    '
  domain: automation
  source_url: https://github.com/aledziko/HA-blueprints/blob/main/IKEA/Matter/ikea-klippbok-e2493/ikea-klippbok-e2493-matter-leak-sensor.yaml
  author: aledziko
  input:
    # Moisture Settings
    moisture_sensor:
      name: KLIPPBOK Leak Sensor
      description: Select the KLIPPBOK leak sensor (binary_sensor).
      selector:
        entity:
          filter:
            - device_class: moisture
              domain: binary_sensor
    
    use_time_window:
      name: Enable Active Hours?
      description: Restrict automation to a specific time window.
      default: false
      selector:
        boolean: {}
    active_start_time:
      name: Active Start Time
      description: Automation starts working at this time (if enabled).
      default: "08:00:00"
      selector:
        time: {}
    active_end_time:
      name: Active End Time
      description: Automation stops working at this time (if enabled).
      default: "22:00:00"
      selector:
        time: {}
    # Wet (Leak Detected) State
    action_wet_immediate:
      name: "Action: Leak Detected (Immediate)"
      description: Run immediately when water is detected.
      default: []
      selector:
        action: {}
    wait_wet_long:
      name: "Wait time (Still Wet)"
      description: Time to wait before running the "Still Wet" action (0 to disable).
      default: 0
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds
    action_wet_long:
      name: "Action: Still Wet (Long)"
      description: Run if the sensor remains wet for the specified wait time.
      default: []
      selector:
        action: {}

    # All Clear Settings
    action_dry_immediate:
      name: "Action: Dry (Immediate)"
      description: Run immediately when the sensor becomes dry.
      default: []
      selector:
        action: {}
    wait_dry_long:
      name: "Wait time (Still Dry)"
      description: Time to wait before running the "Still Dry" action (0 to disable).
      default: 0
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds
    action_dry_long:
      name: "Action: Still Dry (Long)"
      description: Run if the sensor remains dry for the specified wait time.
      default: []
      selector:
        action: {}

    # Battery Settings
    battery_entity:
      name: (Optional) Battery Sensor
      description: Select the battery level sensor (sensor.battery).
      default: []
      selector:
        entity:
          filter:
            domain: sensor
            device_class: battery
    battery_low_threshold:
      name: (Optional) Battery Low Level
      description: Threshold for battery alert (%).
      default: 30
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    battery_low_action:
      name: "Action: Battery Low"
      description: Run when battery drops below threshold.
      default: []
      selector:
        action: {}

mode: parallel
max_exceeded: silent

trigger_variables:
  moisture_sensor_input: !input moisture_sensor
  battery_entity_input: !input battery_entity
  battery_threshold_input: !input battery_low_threshold
  wait_wet_long_input: !input wait_wet_long
  wait_dry_long_input: !input wait_dry_long
  use_time_window_input: !input use_time_window

triggers:
  - trigger: state
    entity_id: !input moisture_sensor
    from: "off"
    to: "on"
    id: leak_detected_immediate
  - trigger: state
    entity_id: !input moisture_sensor
    from: "off"
    to: "on"
    for:
      seconds: !input wait_wet_long
    id: leak_detected_long
  - trigger: state
    entity_id: !input moisture_sensor
    from: "on"
    to: "off"
    id: leak_cleared_immediate
  - trigger: state
    entity_id: !input moisture_sensor
    from: "on"
    to: "off"
    for:
      seconds: !input wait_dry_long
    id: leak_cleared_long
  - trigger: template
    value_template: >
      {{ battery_entity_input != none and battery_entity_input != [] and battery_entity_input != '' and 
         states(battery_entity_input) | is_number and 
         states(battery_entity_input) | float(100) < battery_threshold_input | float(-1) }}
    id: battery_low

condition:
  - condition: or
    conditions:
      - condition: template
        value_template: "{{ not use_time_window_input }}"
      - condition: time
        after: !input active_start_time
        before: !input active_end_time

actions:
  - choose:
      # LEAK DETECTED (IMMEDIATE)
      - conditions:
          - condition: trigger
            id: leak_detected_immediate
        sequence: !input action_wet_immediate

      # LEAK DETECTED (LONG)
      - conditions:
          - condition: trigger
            id: leak_detected_long
          - condition: template
            value_template: "{{ wait_wet_long_input | int > 0 }}"
        sequence: !input action_wet_long

      # LEAK CLEARED (IMMEDIATE)
      - conditions:
          - condition: trigger
            id: leak_cleared_immediate
        sequence: !input action_dry_immediate

      # LEAK CLEARED (LONG)
      - conditions:
          - condition: trigger
            id: leak_cleared_long
          - condition: template
            value_template: "{{ wait_dry_long_input | int > 0 }}"
        sequence: !input action_dry_long

      # BATTERY LOW
      - conditions:
          - condition: trigger
            id: battery_low
        sequence: !input battery_low_action
